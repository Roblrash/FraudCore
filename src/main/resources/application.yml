spring:
  application:
    name: fraudcore
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fraudcore}
    username: ${DB_USERNAME:fraudcore}
    password: ${DB_PASSWORD:fraudcore}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_GROUP_ID:fraudcore-group}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: '*'
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    ru.fraudcore: INFO

fraudcore:
  security:
    jwt-secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-change-me-change-me}
    jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  kafka:
    topics:
      transaction-created: ${KAFKA_TOPIC_TRANSACTION_CREATED:transaction.created}
      transaction-scored: ${KAFKA_TOPIC_TRANSACTION_SCORED:transaction.scored}
      fraud-case-created: ${KAFKA_TOPIC_FRAUD_CASE_CREATED:fraud.case.created}
      fraud-case-closed: ${KAFKA_TOPIC_FRAUD_CASE_CLOSED:fraud.case.closed}
  scoring:
    suspicious-counterparties: ${SUSPICIOUS_COUNTERPARTIES:Unknown Recipient,Bad Merchant,Fraud Shop}
